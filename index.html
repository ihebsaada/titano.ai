<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Images/Risorsa 3.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO (global default) -->
    <title>Robotic Media™ Infrastructure by Titano</title>
    <meta
      name="description"
      content="Robotic Media is a new infrastructure category where autonomous machines become programmable media nodes operating in the physical world. Powered by Titano OS."
    />
    <meta
      name="keywords"
      content="Robotic Media, Titano OS, media infrastructure, DOOH, programmable media, physical media network, impression measurement, campaign analytics, Titano"
    />
    <meta name="author" content="Titano" />
    <meta name="robots" content="index,follow,max-image-preview:large" />

    <!-- Canonical (global default; per-page will override via Helmet) -->
    <link rel="canonical" href="https://titano.ai/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Titano" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://titano.ai/" />
    <meta property="og:title" content="Robotic Media™ Infrastructure by Titano" />
    <meta
      property="og:description"
      content="Robotic Media is a new infrastructure category where autonomous machines become programmable media nodes operating in the physical world. Powered by Titano OS."
    />
    <!-- Use a real social share image (1200x630). Replace path with your actual file. -->
    <meta property="og:image" content="https://titano.ai/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Robotic Media™ Infrastructure by Titano" />
    <meta
      name="twitter:description"
      content="Robotic Media is a new infrastructure category where autonomous machines become programmable media nodes operating in the physical world. Powered by Titano OS."
    />
    <meta name="twitter:image" content="https://titano.ai/og/robotic-media.jpg" />

    <!-- Structured Data: Organization + WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "Titano",
            "url": "https://titano.ai",
            "logo": "https://titano.ai/og/logo.png",
            "description": "Titano is the company behind the Robotic Media™ infrastructure. Titano develops Titano OS, the media infrastructure designed to enable Robotic Media networks across real-world environments.",
            "founder": { "@type": "Person", "name": "Lorenzo Macali" },
            "foundingLocation": { "@type": "Place", "name": "Milan, Italy" },
            "sameAs": ["https://www.linkedin.com/company/titano-ai"]
          },
          {
            "@type": "WebSite",
            "name": "Titano",
            "url": "https://titano.ai",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://titano.ai/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
