<!DOCTYPE html>
<html>
<head>
    <title>Background Test</title>
</head>
<body>
    <script>
        // Test the class detection logic
        function testBackgroundDetection() {
            const testCases = [
                'h-full p-8 bg-[#1B1B1B] text-white border-white/10',
                'rounded-t-[60px] rounded-b-none border-t border-white/10 bg-black/90 backdrop-blur-3xl',
                'h-full flex flex-col justify-end relative overflow-hidden bg-[#1B1B1B] text-white border-white/10',
                'p-8 h-48 flex flex-col justify-between transition-all duration-300 bg-[#1B1B1B] text-white border-white/10 hover:border-white/20',
                'some-class without-bg',
                ''
            ];

            testCases.forEach(className => {
                const hasCustomBackground = className && (className.includes('bg-') || className.includes('bg['));
                console.log(`Class: "${className}" -> Has custom bg: ${hasCustomBackground}`);
            });
        }

        testBackgroundDetection();
    </script>
</body>
</html>
